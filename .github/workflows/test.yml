name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  unit-tests:
      name: Unit tests
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
          - uses: actions/checkout@v2
          - uses: gradle/wrapper-validation-action@v1
          - uses: actions/setup-java@v1
            with:
                java-version: 11
          - uses: actions/cache@v2
            with:
                path: ~/.gradle/caches
                key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle') }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

          - name: Unit tests
            run: ./gradlew -Pcoverage testFdroidDebugUnitTest --stacktrace
          - uses: codecov/codecov-action@v1
            with:
                verbose: true

  instrumentation-tests:
      name: Instrumentation tests
      runs-on: macOS-latest
      timeout-minutes: 60
      strategy:
          fail-fast: true
          matrix:
              api-level: [21, 23, 29]
      steps:
          - uses: actions/checkout@v2
          - uses: gradle/wrapper-validation-action@v1
          - uses: actions/setup-java@v1
            with:
                java-version: 11

          # Restore the cache.
          # Intentionally don't set 'restore-keys' so the cache never contains redundant dependencies.
          - uses: actions/cache@v2
            with:
                path: ~/.gradle/caches
                key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle') }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

          - name: Instrumentation tests
            uses: reactivecircus/android-emulator-runner@v2
            with:
                api-level: ${{ matrix.api-level }}
                arch: x86
                script: ./gradlew -Pcoverage connectedFdroidDebugAndroidTest --stacktrace
          - uses: codecov/codecov-action@v1
            with:
                verbose: true
