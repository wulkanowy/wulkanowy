version: 2
updates:
- package-ecosystem: gradle
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  target-branch: develop
  reviewers:
  - Faierbel
  ignore:
  - dependency-name: androidx.appcompat:appcompat
    versions:
    - ">= 1.3.a, < 1.4"
  - dependency-name: com.github.ChuckerTeam.Chucker:library
    versions:
    - "> 3.1.1, < 3.2"
  - dependency-name: com.github.ChuckerTeam.Chucker:library-no-op
    versions:
    - "> 3.1.1, < 3.2"
  - dependency-name: com.github.wulkanowy:MaterialChipsInput
    versions:
    - "> b72fd0ee6f"
  - dependency-name: com.squareup.okhttp3:logging-interceptor
    versions:
    - ">= 3.13.a, < 3.14"
  - dependency-name: com.squareup.okhttp3:logging-interceptor
    versions:
    - ">= 3.14.a, < 3.15"
  - dependency-name: com.squareup.okhttp3:logging-interceptor
    versions:
    - ">= 4.a, < 5"
  - dependency-name: io.fabric.tools:gradle
    versions:
    - "> 1.31.0"
  - dependency-name: org.jetbrains.kotlinx:kotlinx-coroutines-android
    versions:
    - "> 1.3.9, < 1.4"
  - dependency-name: org.jetbrains.kotlinx:kotlinx-coroutines-test
    versions:
    - "> 1.3.9, < 1.4"
  - dependency-name: org.jetbrains.kotlinx:kotlinx-coroutines-test
    versions:
    - "> 1.4.2, < 1.5"
  - dependency-name: org.sonarsource.scanner.gradle:sonarqube-gradle-plugin
    versions:
    - "> 2.8, < 2.9"
  - dependency-name: ru.cian:huawei-publish-gradle-plugin
    versions:
    - 1.2.4
  - dependency-name: org.jetbrains.kotlinx:kotlinx-coroutines-android
    versions:
    - 1.4.3-native-mt
  - dependency-name: com.mikepenz:aboutlibraries-core
    versions:
    - 8.8.4
  - dependency-name: com.mikepenz.aboutlibraries.plugin:aboutlibraries-plugin
    versions:
    - 8.8.4
  - dependency-name: androidx.hilt:hilt-compiler
    versions:
    - 1.0.0-alpha03
  - dependency-name: com.huawei.agconnect:agcp
    versions:
    - 1.5.1.200
