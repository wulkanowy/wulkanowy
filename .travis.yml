language: android
jdk: oraclejdk8

env:
 global:
    - ANDROID_API_LEVEL=28
    - ANDROID_BUILD_TOOLS_VERSION=28.0.3

cache:
  directories:
    - $HOME/.gradle/caches/
    - $HOME/.gradle/wrapper/

branches:
  only:
  - master

android:
 licenses:
    - android-sdk-preview-license-.+
    - android-sdk-license-.+
    - google-gdk-license-.+
 components:
    - tools
    - platform-tools
    # The BuildTools version used by your project
    - build-tools-$ANDROID_BUILD_TOOLS_VERSION
    # The SDK version used to compile your project
    - android-$ANDROID_API_LEVEL
    # Additional components
    - extra-google-google_play_services
    - extra-google-m2repository
    - extra-android-m2repository
    - addon-google_apis-google-$ANDROID_API_LEVEL
    # Android emulator
    - android-19
    - sys-img-armeabi-v7a-android-19

before_script:
    # Launch emulator before the execution
    - echo no | android create avd --force -n test -t android-19 --abi armeabi-v7a
    - emulator -avd test -no-audio -no-window &
    - android-wait-for-emulator
    - adb shell input keyevent 82 &

script:
  - curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install.sh | bash
  - ./gradlew build -x test -x lint -x fabricGenerateResourcesRelease -x packageRelease --stacktrace -PdisablePreDex
  - fossa --no-ansi || true
  - ./gradlew lint -x fabricGenerateResourcesRelease --stacktrace -PdisablePreDex
  - ./gradlew test -x fabricGenerateResourcesRelease --stacktrace -PdisablePreDex
  - ./gradlew createDebugCoverageReport --stacktrace -PdisablePreDex -PdisableCrashlytics
  - ./gradlew jacocoTestReport --stacktrace -PdisablePreDex
  - 'if [ "$TRAVIS_PULL_REQUEST" != "false" ] || [ "$TRAVIS_BRANCH" == "master" ]; then bash ./gradlew -x test -x lint sonarqube -Dsonar.host.url=$SONAR_HOST -Dsonar.organization=$SONAR_ORG -Dsonar.login=$SONAR_KEY -Dsonar.branch.name=$TRAVIS_BRANCH --stacktrace -PdisablePreDex; fi'

after_success:
  - bash <(curl -s https://codecov.io/bash)
